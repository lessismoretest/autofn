name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        run: |
          chmod +x scripts/build_auto_fn_menu_bar_app.sh
          scripts/build_auto_fn_menu_bar_app.sh

      - name: Build DMG
        run: |
          chmod +x scripts/build_dmg.sh
          scripts/build_dmg.sh

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
